<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>急診儀器定位系統</title>
<style>
:root{
  --ink:#14202b; --muted:#5b6b76; --line:#dfe6ea; --paper:#f4f6f7; --white:#fff;
  --primary:#0f5a6e; --primary-d:#0a4250; --accent:#14708a;
  --s-in:#2e9e5b; --s-out:#e0931f; --s-off:#9aa6ad; --s-repair:#2f7dc4; --s-borrow:#8e5bc4; --s-away:#d8642a;
  --shadow:0 1px 3px rgba(20,40,55,.12),0 6px 20px rgba(20,40,55,.07);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
  background:var(--paper);color:var(--ink);font-size:15px;line-height:1.55}
.app{display:grid;grid-template-columns:1fr 360px;grid-template-rows:auto 1fr auto;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--primary);color:#fff;display:flex;align-items:center;
  gap:14px;padding:10px 18px;box-shadow:var(--shadow);z-index:30}
.topbar h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.5px}
.topbar .sub{font-size:12px;opacity:.8}
.topbar .clock{margin-left:auto;font-variant-numeric:tabular-nums;font-size:13px;opacity:.9}
.tabs{display:flex;gap:4px;margin-left:18px}
.tab{background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 14px;border-radius:7px 7px 0 0;
  cursor:pointer;font-size:13px;font-family:inherit;opacity:.75;transition:.15s}
.tab.on{background:var(--paper);color:var(--primary);opacity:1;font-weight:700}

.stage{position:relative;overflow:hidden;background:#e9edef}
.mapwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:14px}
.mapframe{position:relative;max-width:100%;max-height:100%;aspect-ratio:1724/767;width:100%;
  background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
.mapframe img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none}
.dot{position:absolute;width:20px;height:20px;border-radius:50%;transform:translate(-50%,-50%);
  border:3px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.4);cursor:pointer;transition:transform .12s;z-index:5}
.dot:hover{transform:translate(-50%,-50%) scale(1.45);z-index:9}
.dot.sel{transform:translate(-50%,-50%) scale(1.9);z-index:10;outline:3px solid rgba(15,90,110,.45)}
.dot.s-in{background:var(--s-in)} .dot.s-out{background:var(--s-out);animation:pulse 1.6s infinite}
.dot.s-off{background:var(--s-off)} .dot.s-repair{background:var(--s-repair)}
.dot.s-borrow{background:var(--s-borrow)} .dot.s-away{background:var(--s-away)}
.dot .tag{position:absolute;left:50%;top:-9px;transform:translate(-50%,-100%);background:var(--ink);color:#fff;
  font-size:13px;font-weight:600;padding:3px 9px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:.1s}
.dot.sel .tag,.dot:hover .tag{opacity:1}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,147,31,.55)}70%{box-shadow:0 0 0 13px rgba(224,147,31,0)}100%{box-shadow:0 0 0 0 rgba(224,147,31,0)}}
/* 軌跡畫在平面圖上 */
#trackLayer{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:6}
#trackLayer polyline{fill:none;stroke:var(--accent);stroke-width:3;vector-effect:non-scaling-stroke;
  stroke-dasharray:7 6;stroke-linecap:round;opacity:.9}
.trackdot{position:absolute;width:24px;height:24px;border-radius:50%;background:var(--primary);
  border:3px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.45);transform:translate(-50%,-50%);z-index:9;pointer-events:none}
.trackdot::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:2px solid var(--primary);opacity:.45;animation:pulse2 1.4s infinite}
@keyframes pulse2{0%{transform:scale(.7);opacity:.6}100%{transform:scale(1.4);opacity:0}}
.trackstart{position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--s-in);
  transform:translate(-50%,-50%);z-index:8;pointer-events:none}
.trackbar{position:absolute;left:50%;top:22px;transform:translateX(-50%);z-index:15;
  background:rgba(255,255,255,.97);border:1px solid var(--line);border-radius:32px;
  padding:8px 12px;display:none;align-items:center;gap:10px;box-shadow:var(--shadow)}
.trackbar.on{display:flex}
.trackbar .lbl{font-size:14.5px;font-weight:700;color:var(--primary);padding:0 6px}
.trackbar button{border:1px solid var(--line);background:#fff;border-radius:30px;padding:7px 14px;
  font-size:14px;cursor:pointer;font-family:inherit}
.trackbar button:hover{background:#f0f5f6}

.mapbar{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:12;
  background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:30px;
  padding:6px 8px;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow);max-width:92%}
.mapbar .now{font-size:14.5px;font-weight:700;color:var(--primary);padding:0 8px;white-space:nowrap}
.chip{border:1px solid var(--line);background:#fff;border-radius:30px;padding:7px 15px;font-size:14px;
  cursor:pointer;font-family:inherit;color:var(--muted);white-space:nowrap}
.chip:hover{background:#f0f5f6} .chip.on{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:700}
.chip.clear{color:var(--s-out)}

.legend{position:absolute;left:14px;bottom:14px;background:rgba(255,255,255,.94);border:1px solid var(--line);
  border-radius:9px;padding:11px 13px;font-size:13.5px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow);z-index:8}
.legend b{font-size:12.5px;color:var(--muted);font-weight:700;letter-spacing:.5px}
.legend .row{display:flex;gap:10px;flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:13px;height:13px;border-radius:50%;display:inline-block}
.poptip{position:absolute;z-index:20;background:#fff;border:1px solid var(--line);border-radius:10px;
  box-shadow:var(--shadow);padding:11px 13px;width:230px;transform:translate(-50%,-115%);pointer-events:auto}
.poptip h4{margin:0 0 4px;font-size:16.5px} .poptip .code{font-size:12.5px;color:var(--muted);font-family:monospace}
.poptip .meta{display:flex;justify-content:space-between;margin-top:8px;font-size:13.5px;color:var(--muted)}
.poptip .acts{display:flex;gap:6px;margin-top:9px}
.poptip button{flex:1;font-size:13.5px;padding:7px;border:1px solid var(--line);background:var(--paper);
  border-radius:6px;cursor:pointer;font-family:inherit}
.poptip button:hover{background:#eaeff1}

.rail{background:var(--white);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
.rail .brand{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.rail .brand .logo{width:34px;height:34px;border-radius:8px;background:var(--primary);color:#fff;
  display:grid;place-items:center;font-weight:800;font-size:13px}
.rail .brand .t{font-size:15px;font-weight:700} .rail .brand .s{font-size:12px;color:var(--muted)}
.railsearch{padding:9px 12px;border-bottom:1px solid var(--line);position:relative}
.railsearch input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:15px}
.railsearch input:focus{outline:none;border-color:var(--primary)}
.suggest{position:absolute;left:12px;right:12px;top:48px;background:#fff;border:1px solid var(--line);
  border-radius:9px;box-shadow:var(--shadow);max-height:260px;overflow-y:auto;z-index:25;display:none}
.suggest.on{display:block}
.suggest .sg{padding:10px 13px;cursor:pointer;border-bottom:1px solid #eef2f3;font-size:14.5px;display:flex;align-items:center;gap:8px}
.suggest .sg:hover{background:#eef5f6} .suggest .sg:last-child{border:none}
.suggest .sg .sdot{width:9px;height:9px;border-radius:50%;flex:none}
.suggest .sg .cd{margin-left:auto;font-family:monospace;font-size:12.5px;color:var(--muted)}
.suggest .hd{padding:7px 12px;font-size:12.5px;color:var(--muted);background:#f7fafb;font-weight:700}
.railhd{padding:10px 16px;font-size:13.5px;font-weight:700;color:var(--primary);letter-spacing:.5px;
  display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--line);background:#f7fafb}
.railhd .badge{margin-left:auto;background:var(--s-out);color:#fff;border-radius:20px;padding:1px 9px;font-size:11px}
.groups{flex:1;overflow-y:auto;padding:6px 10px}
.grp{border:1px solid var(--line);border-radius:9px;margin-bottom:7px;overflow:hidden}
.grp>.gh{display:flex;align-items:center;gap:9px;padding:9px 11px;cursor:pointer;background:#fff}
.grp>.gh:hover{background:#f7fafb}
.grp.active>.gh{background:#e8f3f5}
.grp .gi{width:34px;height:34px;border-radius:8px;background:var(--paper);display:grid;place-items:center;font-size:18px}
.grp .gt{font-size:14.5px;font-weight:700} .grp .gs{font-size:12.5px;color:var(--muted)}
.grp .chev{margin-left:auto;color:var(--muted);transition:.15s;font-size:12px}
.grp.open .chev{transform:rotate(90deg)}
.grp .items{display:none;border-top:1px solid var(--line);background:#fafcfc}
.grp.open .items{display:block}
.it{display:flex;align-items:center;gap:10px;padding:9px 11px 9px 14px;cursor:pointer;border-bottom:1px solid #eef2f3;font-size:13.5px}
.it:hover{background:#eef5f6} .it:last-child{border-bottom:none} .it.sel{background:#e8f3f5}
.it .sdot{width:12px;height:12px;border-radius:50%;flex:none}
.it .nm{font-weight:700} .it .cd{font-family:monospace;font-size:12px;color:var(--muted)}
.it .zn{margin-left:auto;font-size:12.5px;padding:2px 9px;border-radius:20px;background:#eef2f3;color:var(--muted)}
.it .zn.moved{background:#fff3e0;color:#b5680f;font-weight:700}

.board{border-top:1px solid var(--line);padding:11px 14px;background:#f7fafb}
.board .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cell{background:#fff;border:1px solid var(--line);border-radius:8px;text-align:center;padding:7px 2px;cursor:pointer;transition:.12s}
.cell:hover{border-color:var(--primary)} .cell.on{border-color:var(--primary);background:#e8f3f5}
.cell .n{font-size:22px;font-weight:800;line-height:1} .cell .l{font-size:12px;color:var(--muted);margin-top:2px}
.cell.c-tot .n{color:var(--primary)} .cell.c-in .n{color:var(--s-in)} .cell.c-out .n{color:var(--s-out)}
.cell.c-off .n{color:var(--s-off)} .cell.c-repair .n{color:var(--s-repair)} .cell.c-borrow .n{color:var(--s-borrow)} .cell.c-away .n{color:var(--s-away)}

.toolbar{grid-column:1/-1;background:var(--primary-d);display:flex;gap:8px;padding:8px 16px;align-items:center}
.toolbar button{background:rgba(255,255,255,.14);border:none;color:#fff;padding:9px 16px;border-radius:7px;
  cursor:pointer;font-size:14.5px;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.toolbar button:hover{background:rgba(255,255,255,.24)}
.toolbar .sp{margin-left:auto;color:rgba(255,255,255,.7);font-size:12px}

.view{position:absolute;inset:0;overflow:auto;padding:16px;background:var(--paper);display:none}
.view.on{display:block}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--shadow);font-size:12.5px}
th,td{padding:8px 11px;text-align:left;border-bottom:1px solid var(--line)} th{background:#f3f7f8;color:var(--muted);font-size:11.5px;position:sticky;top:0}
td.code{font-family:monospace;font-size:11.5px} tr:hover{background:#f7fafb}
.pill{padding:1px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;display:inline-block}
.toolrow{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.toolrow input,.toolrow select{padding:7px 10px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13px}
.btn{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px}
.btn.ghost{background:#fff;color:var(--primary);border:1px solid var(--primary)}
.note{background:#fff;border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:8px;padding:14px 16px;margin-bottom:14px}
.note h3{margin:0 0 6px;font-size:14px;color:var(--primary)} .note p{margin:5px 0;color:var(--muted)}
.schema{font-family:monospace;font-size:12px;background:#0e2229;color:#cfe6ec;padding:14px 16px;border-radius:9px;overflow-x:auto;white-space:pre}
.schema .k{color:#7fd1c5} .schema .c{color:#6b8a93} .schema .u{color:#ffd479}
.kv{display:grid;grid-template-columns:140px 1fr;gap:2px 14px;font-size:12.5px;margin-top:8px}
.kv b{color:var(--primary)} .kv span{color:var(--muted)}

.mask{position:fixed;inset:0;background:rgba(15,32,43,.45);display:none;align-items:center;justify-content:center;z-index:50}
.mask.on{display:flex}
.modal{background:#fff;border-radius:13px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:440px;max-width:92vw;overflow:hidden}
.modal .mh{background:var(--primary);color:#fff;padding:13px 17px;display:flex;align-items:center;font-size:15px;font-weight:700}
.modal .mh .x{margin-left:auto;cursor:pointer;opacity:.8;font-size:18px} .modal .mh .x:hover{opacity:1}
.modal .mb{padding:17px} .modal label{display:block;font-size:12.5px;color:var(--muted);margin:11px 0 4px;font-weight:600}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-family:inherit;font-size:13px}
.modal .mf{padding:13px 17px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-end}
.seg{display:flex;gap:6px} .seg button{flex:1;padding:8px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;font-family:inherit;font-size:13px}
.seg button.on{background:var(--primary);color:#fff;border-color:var(--primary)}
.tkwrap{position:relative}
.track{height:280px;background:#eef2f3;border-radius:9px;margin-top:12px;position:relative;overflow:hidden}
.track .tline{position:absolute;height:2px;background:var(--accent);transform-origin:left center}
.track .tp{position:absolute;width:14px;height:14px;border-radius:50%;background:var(--primary);border:2px solid #fff;transform:translate(-50%,-50%);transition:.4s linear}
.track .tlabel{position:absolute;top:9px;left:9px;font-size:11px;color:var(--muted);background:#fff;padding:2px 8px;border-radius:6px}
@media(max-width:880px){.app{grid-template-columns:1fr}.rail{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>急診儀器定位系統</h1>
    <span class="sub">嘉義基督教醫院 · 急診 1F</span>
    <div class="tabs">
      <button class="tab on" data-view="map">定位地圖</button>
      <button class="tab" data-view="list">儀器列表</button>
      <button class="tab" data-view="data">點班串接</button>
      <button class="tab" data-view="admin">管理清單</button>
    </div>
    <span class="clock" id="clock"></span>
  </div>

  <div class="stage">
    <div class="view on" id="v-map" style="position:absolute;inset:0">
      <div class="mapbar" id="mapbar"></div>
      <div class="trackbar" id="trackBar">
        <span class="lbl" id="trackLbl"></span>

let seed=42; function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}

const CONFIG={
  source:'demo',              // 'demo'=示意資料(展示/競賽) ｜ 'feed'=即時資料(創鈺)
  masterUrl:'equipment.json', // 設備主檔(共用資訊):同 repo 的相對路徑;讀不到就用內建示意

  trackUrl:'',                // 軌跡端點(可留空):創鈺軌跡 API,需帶 ?code=財碼&from=&to=
  refreshSec:15,              // feed 模式自動刷新秒數
};

// 座標校正:創鈺地圖座標 → 本平面圖(0~1)。等創鈺給該樓層座標範圍再填。
// 留 null = 不用座標,改用「區域」放點(永遠可用)。
// 例: {minX:0,maxX:1553,minY:0,maxY:700,flipY:true}
const CALIB=null;

// 創鈺代碼 → 本系統代碼 的對照表（拿到創鈺實際值後填這兩張）
const ZONE_ALIAS={ /* 例: '第一觀察':'guan1','急救室':'resus','負壓':'neg','檢傷':'triage' */ };
const STATUS_ALIAS={ /* 例: 'online':'in','offline':'off' */ };
function mapZone(v){return ZONE_ALIAS[v]||v;}     // 對不到就原樣帶入,方便看出哪個沒對到
function mapStatus(v){return STATUS_ALIAS[v]||'in';}
function minsAgo(t){if(!t)return 0;const d=new Date(t);return isNaN(d)?0:Math.max(0,Math.round((Date.now()-d)/60000));}
function projectXY(rx,ry){
  if(!CALIB||rx==null||ry==null)return null;
  let px=(rx-CALIB.minX)/(CALIB.maxX-CALIB.minX);
  let py=(ry-CALIB.minY)/(CALIB.maxY-CALIB.minY);
  if(CALIB.flipY)py=1-py;
  return [Math.max(0,Math.min(1,px)),Math.max(0,Math.min(1,py))];
}

// 把創鈺回傳的「一筆」轉成本系統欄位（右側欄位名待創鈺確認後微調）
function adaptRow(r){
  let st='in';
  if(r.repair||r.repairing||r.underRepair) st='repair';      // 請修旗標
  else if(r.borrow||r.borrowed||r.lent)    st='borrow';      // 借出旗標
  else if(r.away||r.checkout)              st='away';        // 攜出
  else if(r.online===false||r.offline)     st='off';         // 離線
  else st=mapStatus(r.status ?? r.tagStatus ?? 'in');
  return {
    code:   r.id ?? r.assetNo ?? r.code,                     // ID-財碼（主鍵★）
    name:   r.name ?? r.devName,                             // 名稱
    cat:    r.category ?? r.cat ?? r.name ?? r.devName,      // 類別(分組用)
    brand:  r.brand ?? '',
    home:   mapZone(r.homeZone ?? r.home ?? ''),             // 配置區
    zone:   mapZone(r.area ?? r.areaName ?? r.zone ?? ''),   // 即時區域 ★
    rx:     r.x ?? r.posX ?? null,                           // 座標X(創鈺地圖座標,需CALIB校正)
    ry:     r.y ?? r.posY ?? null,                           // 座標Y
    status: st,
    battery:r.battery ?? 100,
    lastSeen:minsAgo(r.lastTime ?? r.updated ?? r.ts),
  };
}

let EQUIP=[], MASTER=[];
function assignCoords(){seed=42;EQUIP.forEach(e=>{
  const p=projectXY(e.rx,e.ry);                              // 有校正座標就用真實點位
  if(p){e.px=p[0];e.py=p[1];}
  else{const z=ZONES[e.zone]||ZONES.treat;                   // 否則用區域散布
    e.px=z.x[0]+rnd()*(z.x[1]-z.x[0]);e.py=z.y[0]+rnd()*(z.y[1]-z.y[0]);}
});}
// 即時區≠配置區 → 自動標「移位」(創鈺只需給位置,移位由系統判斷)
function deriveMoved(){EQUIP.forEach(e=>{if(e.status==='in'&&e.home&&e.zone&&e.zone!==e.home)e.status='out';});}

// (1) 主檔:讀同 repo 的 equipment.json(你管理的共用資訊);讀不到就用內建示意
async function loadMaster(){
  if(CONFIG.masterUrl){
    try{
      const res=await fetch(CONFIG.masterUrl,{cache:'no-store'});
      if(res.ok){
        const arr=await res.json();
        if(Array.isArray(arr)&&arr.length){
          return arr.map(m=>({
            code:String(m.code), name:m.name, cat:m.cat||m.name, brand:m.brand||'',
            home:mapZone(m.home_zone||m.home||'treat'), needRollcall:m.need_rollcall!==false,
            zone:mapZone(m.home_zone||m.home||'treat'), status:'in', battery:100, lastSeen:0, rx:null, ry:null
          }));
        }
      }
    }catch(err){ /* 沒有 equipment.json → 用示意 */ }
  }
  return DEMO_EQUIP.map(o=>({...o}));     // 後備:示意資料(已含 live 欄位)
}

// (2) 即時:創鈺 feed,整理成 {財碼: 即時資料}
async function loadLive(){
  if(!(CONFIG.source==='feed'&&CONFIG.feedUrl))return null;
  try{
    const res=await fetch(CONFIG.feedUrl,{cache:'no-store'});
    const raw=await res.json();
    const live=(Array.isArray(raw)?raw:(raw.items||[])).map(adaptRow).filter(e=>e.code);
    const map={}; live.forEach(e=>map[e.code]=e); return map;
  }catch(err){console.error('即時資料讀取失敗',err);return null;}
}

// (3) 合併:主檔為準(財碼/名稱/類別/配置區),即時只覆蓋 位置/狀態/座標/電量
function mergeLive(live){
  EQUIP=MASTER.map(m=>{
    const e={...m};
    const L=live&&live[m.code];
    if(L){e.zone=L.zone||m.home; e.status=L.status; e.rx=L.rx; e.ry=L.ry; e.battery=L.battery; e.lastSeen=L.lastSeen;}
    return e;
  });
  deriveMoved(); assignCoords();
}

// 首次:載主檔+即時並合併
async function loadEquip(){
  MASTER=await loadMaster();
  const live=await loadLive();
  mergeLive(live);
}
// 定時:只刷新即時(主檔不重載,保留你在「管理清單」的編輯)
async function refreshLive(){
  const live=await loadLive();
  mergeLive(live);
  renderAll();
}

// 地圖顯示狀態: mapItem(單台) > mapCat(單類) > mapMode('abn'異常 / 'all'全部)
let mapItem=null, mapCat=null, mapMode='abn';
let curFilter=null, selCode=null, brCode=null;

function visibleOnMap(e){
  if(curFilter)return e.status===curFilter;
  if(mapItem)return e.code===mapItem;
  if(mapCat)return e.cat===mapCat;
  if(mapMode==='all')return true;
  return e.status==='out'||e.status==='off';   // 預設:只顯示異常
}

function statusCounts(){const c={tot:EQUIP.length,in:0,out:0,off:0,repair:0,borrow:0,away:0};
  EQUIP.forEach(e=>c[e.status]++);return c;}

function renderBoard(){
  const c=statusCounts();
  const defs=[['tot','總數','c-tot'],['in','站內','c-in'],['out','移位','c-out'],['off','離線','c-off'],
    ['repair','送修','c-repair'],['borrow','外借','c-borrow'],['away','攜出','c-away']];
  document.getElementById('board').innerHTML=defs.map(([k,l,cls])=>
    `<div class="cell ${cls} ${curFilter===k?'on':''}" onclick="filterStatus('${k}')"><div class="n">${c[k]}</div><div class="l">${l}</div></div>`).join('');
  document.getElementById('total').textContent=c.tot;
  document.getElementById('abnBadge').textContent='異常 '+(c.out+c.off);
}
function filterStatus(k){
  if(k==='tot'){curFilter=null;mapMode='all';mapCat=null;mapItem=null;}
  else{curFilter=(curFilter===k)?null:k;mapItem=null;mapCat=null;}
  renderAll();
}

function renderMapbar(){
  const bar=document.getElementById('mapbar');let label='',html='';
  if(mapItem){const e=EQUIP.find(x=>x.code===mapItem);label='只顯示:'+e.name+' '+e.code.slice(-5);}
  else if(mapCat){label='只顯示:'+mapCat+'（'+EQUIP.filter(x=>x.cat===mapCat).length+'台）';}
  else if(curFilter){label='狀態篩選:'+STATUS[curFilter][0];}
  else if(mapMode==='all'){label='顯示全部儀器';}
  else{label='預設:只顯示異常（移位/離線）';}
  html=`<span class="now">${label}</span>
    <button class="chip ${mapMode==='abn'&&!mapCat&&!mapItem&&!curFilter?'on':''}" onclick="setMode('abn')">只看異常</button>
    <button class="chip ${mapMode==='all'&&!mapCat&&!mapItem&&!curFilter?'on':''}" onclick="setMode('all')">全部</button>`;
  if(mapCat||mapItem||curFilter)html+=`<button class="chip clear" onclick="setMode('abn')">✕ 清除</button>`;
  bar.innerHTML=html;
}
function setMode(m){clearTrack();mapMode=m;mapCat=null;mapItem=null;curFilter=null;renderAll();}

function renderDots(){
  const f=document.getElementById('mapframe');
  f.querySelectorAll('.dot').forEach(d=>d.remove());
  EQUIP.forEach(e=>{
    if(!visibleOnMap(e))return;
    const d=document.createElement('div');
    d.className='dot s-'+e.status+(e.code===selCode?' sel':'');
    d.style.left=(e.px*100)+'%';d.style.top=(e.py*100)+'%';
    d.innerHTML=`<span class="tag">${e.name} ${e.code.slice(-5)}</span>`;
    d.title=e.name+' '+e.code;
    d.onclick=ev=>{ev.stopPropagation();showPop(e,d);};
    f.appendChild(d);
  });
}

function showPop(e,d){
  selCode=e.code;renderDots();renderGroups();
  document.querySelectorAll('.poptip').forEach(p=>p.remove());
  const p=document.createElement('div');p.className='poptip';
  p.style.left=(e.px*100)+'%';p.style.top=(e.py*100)+'%';
  const [sl]=STATUS[e.status];const moved=e.zone!==e.home;
  p.innerHTML=`<h4>${e.name}</h4><div class="code">${e.code} · ${e.brand}</div>
    <div class="meta"><span>即時:<b style="${moved?'color:#b5680f':''}">${ZONES[e.zone].name}</b></span><span>配置:${ZONES[e.home].name}</span></div>
    <div class="meta"><span>狀態:<b>${sl}</b></span><span>🔋${e.battery}% · ${e.lastSeen}分前</span></div>
    <div class="acts"><button onclick="openBR('${e.code}')">外借/送修</button>
    <button onclick="document.getElementById('tkCode').value='${e.code}';openTrack();playTrack();">查軌跡</button></div>`;
  document.getElementById('mapframe').appendChild(p);
}

function renderGroups(){
  const cats={};EQUIP.forEach(e=>{(cats[e.cat]=cats[e.cat]||[]).push(e);});
  const g=document.getElementById('groups');
  const openCats=[...g.querySelectorAll('.grp.open')].map(x=>x.dataset.cat);
  g.innerHTML='';
  Object.keys(cats).forEach(cat=>{
    const all=cats[cat];const online=all.filter(e=>e.status==='in').length;
    const off=all.filter(e=>e.status==='off').length;
    const isOpen=openCats.includes(cat);
    const el=document.createElement('div');el.className='grp'+(isOpen?' open':'')+(mapCat===cat?' active':'');el.dataset.cat=cat;
    el.innerHTML=`<div class="gh"><div class="gi">${ICON[cat]||'⬛'}</div>
      <div><div class="gt">${cat}</div><div class="gs">總共 ${all.length} 台 · 線上 ${online} · 離線 ${off}</div></div>
      <span class="chev">▶</span></div>
      <div class="items">${all.map(e=>{const moved=e.zone!==e.home&&e.status==='out';
        return `<div class="it ${e.code===selCode?'sel':''}" onclick="locate('${e.code}',event)"><span class="sdot" style="background:var(--${'s-'+e.status})"></span>
        <span><span class="nm">${e.code.slice(-5)}</span> <span class="cd">${e.brand}</span></span>
        <span class="zn ${moved?'moved':''}">${ZONES[e.zone].name}</span></div>`;}).join('')}</div>`;
    el.querySelector('.gh').onclick=()=>{
      const nowOpen=el.classList.contains('open');
      // 手風琴:一次開一類,同時地圖只顯示這一類
      document.querySelectorAll('.grp').forEach(x=>x.classList.remove('open','active'));
      if(nowOpen){mapCat=null;}
      else{el.classList.add('open','active');mapCat=cat;mapItem=null;curFilter=null;}
      switchView('map');renderDots();renderMapbar();
    };
    g.appendChild(el);
  });
}

function renderSuggest(q,boxId,onItem,onCat){
  q=q.trim().toLowerCase();const box=document.getElementById(boxId);
  if(!q){box.classList.remove('on');return;}
  // 先列符合的類別,再列符合的個別儀器
  const cats=[...new Set(EQUIP.map(e=>e.cat))].filter(c=>c.toLowerCase().includes(q));
  const items=EQUIP.filter(e=>(e.name+e.code+e.brand).toLowerCase().includes(q)).slice(0,12);
  if(!cats.length&&!items.length){box.innerHTML='<div class="sg" style="color:#9aa6ad">查無符合</div>';box.classList.add('on');return;}
  let h='';
  if(cats.length){h+='<div class="hd">類別（看整類）</div>'+cats.map(c=>{
    const n=EQUIP.filter(e=>e.cat===c).length;
    return `<div class="sg" data-cat="${c}">${ICON[c]||'⬛'} ${c} <span class="cd">${n} 台</span></div>`;}).join('');}
  if(items.length){h+='<div class="hd">單台儀器</div>'+items.map(e=>
    `<div class="sg" data-code="${e.code}"><span class="sdot" style="background:var(--${'s-'+e.status})"></span>${e.name} · ${e.brand}<span class="cd">${e.code}</span></div>`).join('');}
  box.innerHTML=h;box.classList.add('on');
  box.querySelectorAll('.sg[data-code]').forEach(s=>s.onmousedown=()=>onItem(s.dataset.code));
  if(onCat)box.querySelectorAll('.sg[data-cat]').forEach(s=>s.onmousedown=()=>onCat(s.dataset.cat));
}

// 寬鬆比對:點班用「名稱」(沒有財碼),所以用多層比對盡量對到正確類別
function findByQuery(q){
  q=(q||'').trim(); if(!q)return null;
  let h=EQUIP.find(x=>x.code===q); if(h)return h;                       // 1.財碼完全相同
  h=EQUIP.find(x=>x.cat.includes(q)||x.name.includes(q)); if(h)return h; // 2.類別/名稱含查詢字
  h=EQUIP.find(x=>q.includes(x.cat)); if(h)return h;                    // 3.點班名稱含某類別
  for(let i=0;i<q.length-1;i++){const g=q.substr(i,2);                  // 4.兩字片段(血氧/推床/超音波/心電…)
    h=EQUIP.find(x=>x.cat.includes(g)||x.name.includes(g)); if(h)return h;}
  return null;
}
function deepLink(type,val){switchView('map');
  if(type==='code'){locate(val);return;}
  const e=findByQuery(val);
  document.querySelectorAll('.grp').forEach(x=>x.classList.remove('open','active'));
  if(e){mapCat=e.cat;mapItem=null;curFilter=null;
    const el=[...document.querySelectorAll('.grp')].find(x=>x.dataset.cat===e.cat);if(el){el.classList.add('open','active');el.scrollIntoView({block:'nearest'});}
    renderDots();renderMapbar();renderGroups();}
  else{ // 對不到(可能非定位追蹤品項):顯示全部,讓使用者自己用搜尋框找
    mapMode='all';mapCat=null;mapItem=null;curFilter=null;renderAll();}
}

// 軌跡資料:有 trackUrl 就抓創鈺真實軌跡(座標經 CALIB 校正成 %),否則回傳 null 用示意
async function fetchTrackPoints(code){
  if(!(CONFIG.source==='feed'&&CONFIG.trackUrl))return null;
  try{
    const res=await fetch(CONFIG.trackUrl+(CONFIG.trackUrl.includes('?')?'&':'?')+'code='+encodeURIComponent(code),{cache:'no-store'});
    const raw=await res.json();
    const arr=Array.isArray(raw)?raw:(raw.points||raw.track||[]);
    return arr.map(p=>{const xy=projectXY(p.x??p.posX,p.y??p.posY);return xy?[xy[0]*100,xy[1]*100]:null;}).filter(Boolean);
  }catch(err){console.error('軌跡讀取失敗,改用示意',err);return null;}
}
// 示意路徑:經過幾個區中心,最後停在該台目前位置(畫在真實平面圖上)

  const c=z=>[(ZONES[z].x[0]+ZONES[z].x[1])/2*100,(ZONES[z].y[0]+ZONES[z].y[1])/2*100];
  return [c('treat'),c('peds'),c('resus'),c('guan1'),[e.px*100,e.py*100]];
}
let trackPts=null, trackDevice=null;
async function playTrack(){
  const q=document.getElementById('tkCode').value.trim().toLowerCase();
  const e=EQUIP.find(x=>x.code.toLowerCase()===q)||EQUIP.find(x=>(x.name+x.code+x.brand).toLowerCase().includes(q));
  if(!e){alert('查無符合的儀器,試試打「心電圖」');return;}
  const real=await fetchTrackPoints(e.code);
  trackPts=(real&&real.length>=2)?real:demoPath(e);
  trackDevice=e;
  closeModal('mask-tk');
  switchView('map');
  mapItem=e.code;mapCat=null;curFilter=null;selCode=e.code;   // 地圖只留這一台
  renderDots();renderMapbar();
  drawTrackOnMap();
}
function drawTrackOnMap(){
  const svg=document.getElementById('trackLayer');
  const frame=document.getElementById('mapframe');
  // 清舊的,改用正規 SVG 命名空間建立元素(最穩)
  while(svg.firstChild)svg.removeChild(svg.firstChild);
  const NS='http://www.w3.org/2000/svg';
  const pl=document.createElementNS(NS,'polyline');
  pl.setAttribute('points',trackPts.map(p=>p[0]+','+p[1]).join(' '));
  svg.appendChild(pl);
  frame.querySelectorAll('.trackdot,.trackstart').forEach(x=>x.remove());
  const start=document.createElement('div');start.className='trackstart';
  start.style.left=trackPts[0][0]+'%';start.style.top=trackPts[0][1]+'%';frame.appendChild(start);
  const tp=document.createElement('div');tp.className='trackdot';tp.id='trackDot';frame.appendChild(tp);
  document.getElementById('mapbar').style.display='none';      // 播軌跡時暫時隱藏篩選列,避免擋到
  document.getElementById('trackLbl').textContent='軌跡:'+trackDevice.name+' '+trackDevice.code;
  document.getElementById('trackBar').classList.add('on');
  runTrack();
}
function runTrack(){
  clearInterval(tkTimer);
  const spd={'1X':700,'2X':400,'4X':220}[document.getElementById('tkSpeed').value]||700;
  const tp=document.getElementById('trackDot');if(!tp)return;
  tp.style.transition='left '+(spd/1000)+'s linear,top '+(spd/1000)+'s linear';
  let i=0;const step=()=>{tp.style.left=trackPts[i][0]+'%';tp.style.top=trackPts[i][1]+'%';i++;};
  step();
  tkTimer=setInterval(()=>{if(i>=trackPts.length)clearInterval(tkTimer);else step();},spd);
}
function replayTrack(){runTrack();}
function clearTrack(){
  clearInterval(tkTimer);
  const svg=document.getElementById('trackLayer');while(svg.firstChild)svg.removeChild(svg.firstChild);
  document.getElementById('mapframe').querySelectorAll('.trackdot,.trackstart').forEach(x=>x.remove());
  document.getElementById('trackBar').classList.remove('on');
  document.getElementById('mapbar').style.display='';         // 還原篩選列
  if(trackDevice){mapItem=null;mapMode='abn';selCode=null;trackDevice=null;renderAll();}  // 收掉「只看這台」回到預設
}

function renderAll(){renderBoard();renderGroups();renderMapbar();renderDots();}

// 進場:處理點班深層連結 ?code= 或 ?q=
function bootDeepLink(){
  const p=new URLSearchParams(location.search);
  const code=p.get('code'),q=p.get('q');
  if(code){const e=EQUIP.find(x=>x.code===code||x.code.endsWith(code));if(e){locate(e.code);return;}}
  if(q){deepLink('q',q);return;}
  renderAll();
}
async function boot(){
  await loadEquip();
  bootDeepLink();
  if(CONFIG.source==='feed'&&CONFIG.refreshSec){
    setInterval(refreshLive,CONFIG.refreshSec*1000);
  }
}
boot();

function tick(){const d=new Date();document.getElementById('clock').textContent=
  d.toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});}
tick();setInterval(tick,1000);
</script>

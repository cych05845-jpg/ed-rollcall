<title>急診護理站電子點班系統</title>
<style>
  :root{
    --bg:#e9edf0; --card:#ffffff; --ink:#23313b; --ink-soft:#5d6c77; --line:#dce3e8;
    --brand:#0f7a86; --brand-dark:#0a5b64; --brand-soft:#e3f2f3;
    --ok:#1f9d57; --ok-soft:#e6f6ed; --warn:#d68a00; --warn-soft:#fdf3df;
    --bad:#d23d3d; --bad-soft:#fbe8e8;
    --shadow:0 1px 3px rgba(20,40,55,.07),0 3px 12px rgba(20,40,55,.05);
    --fs:15.5px;
  }
  [data-theme="dark"]{
    --bg:#0f1620; --card:#1b2630; --ink:#dde7ee; --ink-soft:#9fb0bc; --line:#2c3c49;
    --brand:#2bb3c0; --brand-dark:#1d8d99; --brand-soft:#16323a;
    --ok:#3ec77a; --ok-soft:#15301f; --warn:#e0a93a; --warn-soft:#332710;
    --bad:#ef6a6a; --bad-soft:#3a1d1d;
    --shadow:0 1px 3px rgba(0,0,0,.35),0 3px 12px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"PingFang TC","Microsoft JhengHei","微軟正黑體","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;font-size:var(--fs);
    -webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
  .app{width:100%;margin:0 auto;min-height:100vh}
  .narrow{max-width:460px;margin:0 auto}
  .wide{max-width:1120px;margin:0 auto}

  .topbar{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;
    padding:14px 18px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(10,91,100,.25)}
  .topbar-in{max-width:1120px;margin:0 auto}
  .topbar .title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
  .topbar .sub{font-size:12.5px;opacity:.88;margin-top:2px}
  .back{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:14px;padding:6px 13px;
    border-radius:8px;font-family:inherit;cursor:pointer}
  .screen{padding:18px}
  .demo-banner{background:#fff8e6;border-bottom:1px solid #f1dca0;color:#8a6a1a;font-size:12px;
    padding:8px 14px;text-align:center;font-weight:600}

  .card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .section-h{font-size:13px;font-weight:700;color:var(--ink-soft);margin:20px 4px 10px}
  .btn{padding:13px 20px;border-radius:12px;border:none;font-size:15.5px;font-weight:700;font-family:inherit;cursor:pointer}
  .btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(15,122,134,.3)}
  .btn-primary:disabled{background:#b8c4ca;box-shadow:none}
  .btn-block{width:100%}
  .btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}

  /* login */
  .login-wrap{padding:48px 26px;text-align:center;max-width:430px;margin:0 auto}
  .login-logo{width:74px;height:74px;border-radius:20px;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;align-items:center;
    justify-content:center;font-size:36px;box-shadow:0 8px 24px rgba(15,122,134,.3)}
  .login-wrap h1{font-size:22px;margin:0 0 4px}.login-wrap .tag{color:var(--ink-soft);font-size:14px;margin-bottom:28px}
  .field{text-align:left;margin-bottom:14px}
  .field label{font-size:13px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px}
  .field input{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;font-family:inherit}

  /* home */
  .date-block{text-align:center;padding:6px 0}
  .date-block .big{font-size:30px;font-weight:800}
  .date-block .day{color:var(--ink-soft);font-size:14px;margin-top:2px}
  .shift-pill{display:inline-flex;align-items:center;gap:6px;background:var(--brand-soft);color:var(--brand-dark);
    font-weight:700;padding:6px 14px;border-radius:999px;font-size:15px;margin-top:10px}
  .role-tag{display:inline-block;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;margin-top:8px}

  /* area tiles (先選分區) */
  .area-tiles{display:grid;gap:10px;grid-template-columns:repeat(2,1fr)}
  .area-tile{border-radius:14px;padding:14px;cursor:pointer;color:#fff;position:relative;min-height:72px;
    display:flex;flex-direction:column;justify-content:center;box-shadow:0 2px 10px rgba(20,40,55,.12);transition:transform .08s}
  .area-tile:active{transform:scale(.97)}
  .area-tile .an{font-size:18px;font-weight:800}
  .area-tile .ac{font-size:11.5px;opacity:.92;font-weight:600;margin-top:3px}
  .area-tile .chev{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:20px;opacity:.7}
  /* sheet list (緊湊列) */
  .area-bar{font-weight:800;font-size:15px;margin:0 2px 12px;padding-left:10px;border-left:4px solid var(--brand)}
  .sheet-list{display:grid;gap:8px;grid-template-columns:1fr}
  .sheet-row{background:#fff;border:1px solid var(--line);border-left-width:4px;border-radius:10px;
    padding:10px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;transition:.08s}
  .sheet-row:active{background:#f6f9fa}
  .sheet-name{font-weight:700;font-size:14.5px}
  .sheet-meta{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
  .badge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle}
  .badge-2p{background:#7a5cc71a;color:#7a5cc7}
  .st-tag{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .st-todo{background:#eef2f5;color:var(--ink-soft)} .st-doing{background:var(--warn-soft);color:var(--warn)} .st-done{background:var(--ok-soft);color:var(--ok)}

  /* half select */
  .half-card{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:22px;text-align:center;cursor:pointer;font-weight:800;font-size:18px}
  .half-card:hover{border-color:var(--brand);box-shadow:var(--shadow)}
  .half-card .d{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:6px}

  /* items as compact list (條列式) */
  .bulk-bar{display:flex;gap:8px;margin-bottom:12px}
  .item-list{display:grid;gap:6px;grid-template-columns:1fr}
  .li{background:var(--card);border:1px solid var(--line);border-radius:9px;display:flex;flex-wrap:wrap;align-items:stretch}
  .li.is-bad{border-color:var(--bad)}
  .li-tap{flex:1;display:flex;gap:10px;align-items:center;padding:9px 11px;cursor:pointer;min-width:0}
  .dot{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex:0 0 24px;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent}
  .dot.ok{background:var(--ok);border-color:var(--ok);color:#fff}
  .dot.bad{background:var(--bad);border-color:var(--bad);color:#fff}
  .li-body{flex:1;min-width:0}
  .li-name{font-weight:600;font-size:14.5px;line-height:1.3}
  .li-qty{font-size:11.5px;color:var(--ink-soft);margin-top:1px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .tb{font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:999px}
  .t-藥品{background:rgba(224,49,49,.14);color:#e03131}.t-耗材{background:rgba(15,122,134,.15);color:#0f9aa8}
  .t-器械{background:rgba(28,126,214,.14);color:#1c7ed6}.t-儀器{background:rgba(103,65,217,.15);color:#7c5cf0}.t-其他{background:rgba(120,130,139,.16);color:#828c95}
  .li-ctrl{display:flex;align-items:center;gap:6px;padding:0 10px}
  .flagbtn{border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);font-family:inherit;
    font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .flagbtn.on{background:var(--bad);border-color:var(--bad);color:#fff}
  .locate-mini{border:1.5px dashed var(--line);background:var(--card);font-size:14px;padding:5px 8px;border-radius:8px;cursor:pointer}
  .li-abn{flex-basis:100%;padding:10px 12px;border-top:1px dashed var(--line);background:var(--bad-soft)}
  .abn-h{font-size:11.5px;font-weight:700;color:var(--bad);margin-bottom:7px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:5px 10px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);font-size:12px;
    font-weight:700;color:var(--ink-soft);font-family:inherit;cursor:pointer}
  .chip.on{background:var(--warn);border-color:var(--warn);color:#fff}
  .chip.on.money{background:var(--bad);border-color:var(--bad)}
  .chip.on.repair{background:var(--brand);border-color:var(--brand)}
  .repair-note{font-size:11px;color:var(--brand);font-weight:700;margin-top:8px}
  .note-in{width:100%;margin-top:8px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;
    font-size:13px;font-family:inherit;background:var(--card);color:var(--ink)}
  /* map placeholder */
  .mapbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}

  /* bottom bar */
  .bottombar{position:sticky;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding:12px 18px;display:flex;gap:12px;align-items:center;z-index:40}
  .bottombar-in{max-width:1120px;margin:0 auto;width:100%;display:flex;gap:12px;align-items:center}
  .progress{flex:1}.progress .ptxt{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:5px}
  .pbar{height:7px;background:var(--line);border-radius:999px;overflow:hidden}.pbar>div{height:100%;background:var(--brand);transition:width .3s}

  /* summary */
  .sum-row{display:flex;gap:12px;margin-bottom:14px}
  .sum-stat{flex:1;background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:16px 10px;text-align:center}
  .sum-stat .n{font-size:30px;font-weight:800}.sum-stat .l{font-size:12px;color:var(--ink-soft);margin-top:2px;font-weight:600}
  .sum-stat.bad .n{color:var(--bad)}.sum-stat.ok .n{color:var(--ok)}
  .issue{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
  .issue:last-child{border-bottom:none}
  .issue-ic{width:32px;height:32px;border-radius:9px;flex:0 0 32px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .issue-ic.bad{background:var(--bad-soft)}.issue-ic.warn{background:var(--warn-soft)}
  .issue-t{font-weight:700;font-size:14px}.issue-d{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
  .done-wrap{text-align:center;padding:46px 20px;max-width:460px;margin:0 auto}
  .done-circle{width:84px;height:84px;border-radius:50%;background:var(--ok-soft);display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 18px}

  /* responsive */
  @media(min-width:680px){
    .item-list{grid-template-columns:repeat(2,1fr)}
    .sheet-list{grid-template-columns:repeat(2,1fr)}
    .area-tiles{grid-template-columns:repeat(3,1fr)}
    .screen{padding:22px}
  }
  @media(min-width:1040px){
    .item-list{grid-template-columns:repeat(3,1fr)}
    .sheet-list{grid-template-columns:repeat(3,1fr)}
    .area-tiles{grid-template-columns:repeat(4,1fr)}
  }
</style>
</head>

// ---------- helpers ----------
const $app=document.getElementById('app');
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function areaById(id){return AREAS.find(a=>a.id===id)||{}}
function sheetById(id){return SHEETS.find(s=>s.id===id)||{}}
function areaColor(id){return (areaById(id).color)||'#0f7a86'}
function fmtDate(d){return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}
function weekday(d){return ['週日','週一','週二','週三','週四','週五','週六'][d.getDay()]}
function detectShift(){const h=new Date().getHours();return (h>=7&&h<15)?'D':(h>=15&&h<23)?'E':'N'}
const SHIFT_NAME={D:'白班',E:'小夜',N:'大夜'};
const ROLE_BADGE={'護理長':['可管理主檔・審核・點班'],'副護理長':['可審核・點班'],'點班人員':['可點班']};
const REASONS=['數量短少','借出未還','待補貨','送修','漏計價','遺失'];

// item key & filtering
function itemsOf(sheetId,half){
  return ITEMS.map((it,i)=>({i,sheet:it[0],name:it[1],qty:it[2],type:it[3],assign:it[4]}))
              .filter(o=>o.sheet===sheetId && (!half || o.assign===half));
}
function keyOf(o){return o.sheet+'|'+o.i}

// ---------- state ----------
let state={screen:'login',user:null,areaId:null,sheetId:null,half:null,checks:{},reason:{},note:{}};
const store={
  save(){try{localStorage.setItem('ed_rc2',JSON.stringify(state))}catch(e){}},
  load(){try{const s=localStorage.getItem('ed_rc2');if(s)state=JSON.parse(s)}catch(e){}}
};

// progress for a sheet (all halves)
function sheetProgress(sheetId){
  const all=itemsOf(sheetId,null);
  let done=0;all.forEach(o=>{if(state.checks[keyOf(o)])done++});
  return {total:all.length,done};
}
function sheetStatus(sheetId){
  const p=sheetProgress(sheetId);
  if(p.done===0)return ['st-todo','未開始'];
  if(p.done<p.total)return ['st-doing',`進行中 ${p.done}/${p.total}`];
  return ['st-done','已完成'];
}

// ---------- render ----------
function render(){
  store.save();
  if(!state.user)state.screen='login';
  ({login:renderLogin,home:renderHome,areas:renderAreas,pick:renderPick,half:renderHalf,
    rollcall:renderRollcall,summary:renderSummary,done:renderDone,map:renderMap}[state.screen]||renderLogin)();
}

  const emp=document.getElementById('empIn').value.trim();

  const err=document.getElementById('loginErr');
  const a=ACCOUNTS.find(x=>x.id===emp);

  if(!a.active){err.textContent='此帳號已停用（留停／長假）';return}
  if(pw!==a.id){err.textContent='登入碼錯誤（初始＝員編）';return}
  state.user={id:a.id,name:a.name,title:a.title,role:a.role};
  state.screen='home';render();
}

function renderRollcall(){
  const s=sheetById(state.sheetId);const list=itemsOf(s.id,state.half);
  const rows=list.map(o=>renderItem(o,s)).join('');
  let done=0;list.forEach(o=>{if(state.checks[keyOf(o)])done++});
  const pct=list.length?Math.round(done/list.length*100):0;
  const halfTxt=state.half?` · ${state.half} 半`:'';
  const remain=list.length-done;
  $app.innerHTML=`

    <div><div class="title">${esc(s.name)}${halfTxt}</div>

function bulkNormal(){
  const s=sheetById(state.sheetId);
  itemsOf(s.id,state.half).forEach(o=>{const k=keyOf(o);if(!state.checks[k])state.checks[k]='ok'});
  render();
}

function renderItem(o,s){
  const k=keyOf(o);const st=state.checks[k];const isDev=o.type==='儀器';
  const dot=st==='ok'?'<span class="dot ok">✓</span>':st==='bad'?'<span class="dot bad">!</span>':'<span class="dot"></span>';
  const assignB=o.assign?`<span class="tb t-儀器">${o.assign}</span>`:'';
  const dev=isDev?`<button class="locate-mini" onclick="openMap('${esc(o.name).replace(/'/g,"")}')" title="定位">📍</button>`:'';
  const repairNote=isDev&&state.reason[k]==='送修'?`<div class="repair-note">🔧 將於 Leader 系統開立請修單（示意）</div>`:'';
  const abn=st==='bad'?`<div class="li-abn">
     <div class="abn-h">⚠ 異常／沒有 — 請註記</div>
     <div class="chips">${REASONS.map(r=>{const on=state.reason[k]===r;
        const cls=(r==='漏計價'||r==='遺失')?'money':(r==='送修'?'repair':'');
        return `<button class="chip ${on?'on':''} ${cls}" onclick="setReason('${k}','${r}')">${r}</button>`}).join('')}</div>
     ${repairNote}
     <input class="note-in" placeholder="備註（選填）" value="${esc(state.note[k]||'')}" onchange="setNote('${k}',this.value)"></div>`:'';
  return `<div class="li ${st==='bad'?'is-bad':''}">
    <div class="li-tap" onclick="setCheck('${k}','ok')">
      ${dot}
      <div class="li-body"><div class="li-name">${esc(o.name)}${assignB}</div>
        <div class="li-qty">標準 ${esc(o.qty)} <span class="tb t-${o.type}">${o.type}</span></div></div>
    </div>
    <div class="li-ctrl">${dev}<button class="flagbtn ${st==='bad'?'on':''}" onclick="setCheck('${k}','bad')">異常</button></div>
    ${abn}</div>`;
}
function setCheck(k,v){state.checks[k]=(state.checks[k]===v?'':v);if(state.checks[k]!=='bad'){delete state.reason[k];delete state.note[k]}render()}
function setReason(k,r){state.reason[k]=(state.reason[k]===r?'':r);render()}
function setNote(k,v){state.note[k]=v}

        <text x="237" y="165" fill="var(--ink-soft)" font-size="11" text-anchor="middle">留觀區</text>
        <circle cx="110" cy="78" r="9" fill="${area.color}"/>
        <circle cx="110" cy="78" r="16" fill="${area.color}" opacity="0.25"/>
      </svg>
      <div style="font-weight:700;margin-top:10px">${esc(state.mapItem||'此儀器')}</div>
      <div style="font-size:12.5px;color:var(--ink-soft);margin-top:4px">
        示意圖 — 正式版將顯示 beacon 廠商系統的即時位置／樓層／區域</div>
      <div style="font-size:11.5px;color:var(--brand);font-weight:700;margin-top:10px">待廠商 beacon 系統接入後啟用</div>
    </div>
  </div>`;
}
function applyTheme(){const t=(()=>{try{return localStorage.getItem('ed_theme')}catch(e){return null}})();
  if(t==='dark')document.documentElement.dataset.theme='dark';else delete document.documentElement.dataset.theme;}
function toggleTheme(){const dark=document.documentElement.dataset.theme!=='dark';
  if(dark)document.documentElement.dataset.theme='dark';else delete document.documentElement.dataset.theme;
  try{localStorage.setItem('ed_theme',dark?'dark':'light')}catch(e){}render();}

function renderSummary(){
  const s=sheetById(state.sheetId);const list=itemsOf(s.id,state.half);
  const issues=[];
  list.forEach(o=>{const k=keyOf(o);if(state.checks[k]==='bad'){
    const r=state.reason[k]||'未註記原因';const money=(r==='漏計價'||r==='遺失');
    issues.push({type:money?'bad':'warn',t:o.name,d:r+(state.note[k]?'・'+state.note[k]:'')})}});
  const issuesHtml=issues.length?issues.map(i=>`<div class="issue">
     <div class="issue-ic ${i.type}">${i.type==='bad'?'⚠':'!'}</div>
     <div><div class="issue-t">${esc(i.t)}</div><div class="issue-d">${esc(i.d)}</div></div></div>`).join('')
     :'<div style="text-align:center;color:var(--ok);padding:16px;font-weight:600">✓ 無異常</div>';
  $app.innerHTML=`
  <div class="topbar"><div class="topbar-in" style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="title">點班摘要 · ${esc(s.name)}${state.half?(' '+state.half+'半'):''}</div>
      <div class="sub">${fmtDate(new Date())} · ${SHIFT_NAME[state.shift]}</div></div>
    <button class="back" onclick="state.screen='rollcall';render()">返回</button></div></div>
  <div class="screen narrow">
    <div class="sum-row">
      <div class="sum-stat"><div class="n">${list.length}</div><div class="l">點檢項目</div></div>
      <div class="sum-stat ${issues.length?'bad':'ok'}"><div class="n">${issues.length}</div><div class="l">異常項目</div></div>
    </div>
    <div class="section-h">異常清單</div>
    <div class="card">${issuesHtml}</div>
    <button class="btn btn-primary btn-block" onclick="state.screen='done';render()">提交並簽核</button>
  </div>`;
}

function renderDone(){
  const s=sheetById(state.sheetId);
  $app.innerHTML=`
  <div class="screen"><div class="done-wrap">
    <div class="done-circle">✓</div>
    <h2 style="margin:0 0 6px">點班完成</h2>
    <p style="color:var(--ink-soft);margin:0 0 24px">${esc(s.name)}${state.half?(' '+state.half+'半'):''}<br>
      ${esc(state.user.name)}（${esc(state.user.title)}）· ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})} 簽核</p>
    <button class="btn btn-primary btn-block" onclick="state.screen='pick';render()">回點班表清單</button>
    <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="state.screen='home';render()">回首頁</button>
  </div></div>`;
}

// ---------- start ----------
applyTheme();
store.load();
state.shift=state.shift||detectShift();
if(!state.user)state.screen='login';
render();
</script>
</body>
</html>

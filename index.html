<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>急診護理站電子點班系統</title>
<style>
  :root{
    --bg:#e9edf0; --bg2:#dfe6ea; --card:#ffffff; --ink:#23313b; --ink-soft:#5d6c77; --line:#d3dbe1;
    --brand:#0f7a86; --brand-dark:#0a5b64; --brand-soft:#e3f2f3;
    --ok:#1f9d57; --ok-soft:#e6f6ed; --warn:#d68a00; --warn-soft:#fdf3df;
    --bad:#d23d3d; --bad-soft:#fbe8e8;
    --shadow:0 1px 3px rgba(20,40,55,.07),0 3px 12px rgba(20,40,55,.05);
    --fs:15.5px;
  }
  [data-theme="dark"]{
    --bg:#0f1620; --bg2:#0a0f17; --card:#1b2630; --ink:#dde7ee; --ink-soft:#9fb0bc; --line:#2c3c49;
    --brand:#2bb3c0; --brand-dark:#1d8d99; --brand-soft:#16323a;
    --ok:#3ec77a; --ok-soft:#15301f; --warn:#e0a93a; --warn-soft:#332710;
    --bad:#ef6a6a; --bad-soft:#3a1d1d;
    --shadow:0 1px 3px rgba(0,0,0,.35),0 3px 12px rgba(0,0,0,.28);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"PingFang TC","Microsoft JhengHei","微軟正黑體","Helvetica Neue",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.55;font-size:var(--fs);
    -webkit-font-smoothing:antialiased;transition:background .2s,color .2s}
  .app{width:100%;margin:0 auto;min-height:100vh}
  .narrow{max-width:460px;margin:0 auto}
  .wide{max-width:1120px;margin:0 auto}

  .topbar{background:linear-gradient(135deg,var(--brand),var(--brand-dark));color:#fff;
    padding:14px 18px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(10,91,100,.25)}
  .topbar-in{max-width:1120px;margin:0 auto}
  .topbar .title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
  .topbar .sub{font-size:12.5px;opacity:.88;margin-top:2px}
  .back{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:14px;padding:6px 13px;
    border-radius:8px;font-family:inherit;cursor:pointer}
  .screen{padding:18px}
  .screen.lvl2{background:var(--bg2)}
  .demo-banner{background:#fff8e6;border-bottom:1px solid #f1dca0;color:#8a6a1a;font-size:12px;
    padding:8px 14px;text-align:center;font-weight:600}

  .card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
  .section-h{font-size:13px;font-weight:700;color:var(--ink-soft);margin:20px 4px 10px}
  .btn{padding:13px 20px;border-radius:12px;border:none;font-size:15.5px;font-weight:700;font-family:inherit;cursor:pointer}
  .btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(15,122,134,.3)}
  .btn-primary:disabled{background:#b8c4ca;box-shadow:none}
  .btn-block{width:100%}
  .btn-ghost{background:#fff;border:1.5px solid var(--line);color:var(--ink)}

  /* login */
  .login-wrap{padding:48px 26px;text-align:center;max-width:430px;margin:0 auto}
  .login-logo{width:74px;height:74px;border-radius:20px;margin:0 auto 18px;
    background:linear-gradient(135deg,var(--brand),var(--brand-dark));display:flex;align-items:center;
    justify-content:center;font-size:36px;box-shadow:0 8px 24px rgba(15,122,134,.3)}
  .login-wrap h1{font-size:22px;margin:0 0 4px}.login-wrap .tag{color:var(--ink-soft);font-size:14px;margin-bottom:28px}
  .field{text-align:left;margin-bottom:14px}
  .field label{font-size:13px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:6px}
  .field input{width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;font-family:inherit}

  /* home */
  .date-block{text-align:center;padding:6px 0}
  .date-block .big{font-size:30px;font-weight:800}
  .date-block .day{color:var(--ink-soft);font-size:14px;margin-top:2px}
  .shift-pill{display:inline-flex;align-items:center;gap:6px;background:var(--brand-soft);color:var(--brand-dark);
    font-weight:700;padding:6px 14px;border-radius:999px;font-size:15px;margin-top:10px}
  .role-tag{display:inline-block;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;margin-top:8px}

  /* area tiles (先選分區) */
  .area-tiles{display:grid;gap:10px;grid-template-columns:repeat(2,1fr)}
  .area-tile{background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;cursor:pointer;position:relative;min-height:64px;display:flex;flex-direction:column;
    justify-content:center;box-shadow:var(--shadow);transition:transform .08s}
  .area-tile:active{transform:scale(.98)}
  .area-tile .an{font-size:17px;font-weight:800;display:flex;align-items:center}
  .area-tile .ac{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:4px;padding-left:18px}
  .area-tile .chev{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--ink-soft);opacity:.55}
  .area-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:8px;flex:0 0 10px}
  /* sheet list (緊湊列) */
  .area-bar{font-weight:800;font-size:15px;margin:0 2px 12px;padding-left:10px;border-left:4px solid var(--brand)}
  .sheet-list{display:grid;gap:8px;grid-template-columns:1fr}
  .sheet-row{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--brand);border-radius:10px;
    padding:11px 13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;transition:.08s}
  .sheet-row:active{opacity:.7}
  /* category section in rollcall */
  .cat{margin-bottom:18px}
  .cat-h{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;margin:0 2px 11px}
  .cat-ic{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .cat-cnt{font-size:13px;font-weight:700;color:var(--ink-soft);margin-left:auto}
  .cat-tools{display:flex;gap:9px;flex-wrap:wrap;margin:0 0 12px}
  .tool-pill{font-size:13.5px;font-weight:700;padding:9px 15px;border-radius:10px;border:1.5px solid var(--brand);
    background:var(--brand-soft);color:var(--brand);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .tool-pill:active{opacity:.7}
  /* status banner (3rd level completion) — prominent */
  .status-banner{display:flex;align-items:center;gap:14px;padding:18px 18px;border-radius:14px;margin-bottom:16px;font-weight:800;font-size:18px}
  .status-banner.todo{background:var(--warn-soft);color:var(--warn);border:2px solid var(--warn)}
  .status-banner.done{background:var(--ok-soft);color:var(--ok);border:2px solid var(--ok)}
  .status-banner .sb-ic{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;flex:0 0 46px}
  .status-banner.todo .sb-ic{background:var(--warn)} .status-banner.done .sb-ic{background:var(--ok)}
  .status-banner .sb-sub{font-size:13px;font-weight:600;opacity:.92;margin-top:2px}
  /* history */
  .hist-day{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 14px;margin-bottom:9px}
  .hist-date{font-weight:800;font-size:14.5px;margin-bottom:9px;display:flex;align-items:center;gap:8px}
  .hist-shift{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13.5px;border-top:1px dashed var(--line)}
  .hist-shift:first-of-type{border-top:none}
  .hist-detail{padding:10px 12px;margin:2px 0 8px;background:var(--bg2);border-radius:9px}
  .hd-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;font-size:13px;border-top:1px dashed var(--line)}
  .hd-row:first-child{border-top:none}
  .month-fold{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:9px;
    cursor:pointer;display:flex;justify-content:space-between;align-items:center}
  .month-fold .mf-r{font-size:12.5px;color:var(--ink-soft);font-weight:600}
  .picker{display:flex;gap:8px;margin-bottom:14px}
  .picker select{flex:1;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:var(--card);color:var(--ink)}
  /* leader reminder */
  .rem-card{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--bad);border-radius:12px;padding:14px 15px;margin-bottom:11px}
  .rem-card.ok{border-left-color:var(--ok)}
  .rem-h{font-weight:800;font-size:15px;display:flex;align-items:center;gap:8px}
  .rem-li{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13.5px;border-top:1px dashed var(--line)}
  .rem-li:first-of-type{border-top:none;margin-top:6px}
  .pill-bad{background:var(--bad-soft);color:var(--bad);font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .pill-ok{background:var(--ok-soft);color:var(--ok);font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  .pill-warn{background:var(--warn-soft);color:var(--warn);font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px}
  /* AI analysis */
  .ai-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 17px;margin-bottom:13px}
  .ai-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .ai-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,#6741d9,#9c5cf0);
    display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 42px}
  .ai-insight{display:flex;gap:11px;padding:12px 0;border-top:1px solid var(--line)}
  .ai-insight:first-of-type{border-top:none}
  .ai-ic{width:32px;height:32px;border-radius:9px;flex:0 0 32px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .ai-t{font-weight:700;font-size:14.5px}
  .ai-d{font-size:13px;color:var(--ink-soft);margin-top:2px;line-height:1.6}
  .ai-bar{height:8px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:7px}
  .ai-bar>div{height:100%;border-radius:999px}
  .ai-typing{display:inline-block;animation:blink 1s infinite}
  @keyframes blink{50%{opacity:.3}}
  .sheet-name{font-weight:700;font-size:14.5px}
  .sheet-meta{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
  .badge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:999px;margin-left:6px;vertical-align:middle}
  .badge-2p{background:#7a5cc71a;color:#7a5cc7}
  .st-tag{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .st-todo{background:#eef2f5;color:var(--ink-soft)} .st-doing{background:var(--warn-soft);color:var(--warn)} .st-done{background:var(--ok-soft);color:var(--ok)}

  /* half select */
  .half-card{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:22px;text-align:center;cursor:pointer;font-weight:800;font-size:18px}
  .half-card:hover{border-color:var(--brand);box-shadow:var(--shadow)}
  .half-card .d{font-size:12.5px;color:var(--ink-soft);font-weight:600;margin-top:6px}

  /* items as compact list (條列式) */
  .bulk-bar{display:flex;gap:8px;margin-bottom:12px}
  .item-list{display:grid;gap:6px;grid-template-columns:1fr}
  .li{background:var(--card);border:1px solid var(--line);border-radius:9px;display:flex;flex-wrap:wrap;align-items:stretch}
  .li.is-bad{border-color:var(--bad)}
  .li-tap{flex:1;display:flex;gap:10px;align-items:center;padding:9px 11px;cursor:pointer;min-width:0}
  .dot{width:28px;height:28px;border-radius:8px;border:2px solid var(--line);flex:0 0 28px;
    display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:transparent}
  .dot.ok{background:var(--ok);border-color:var(--ok);color:#fff}
  .dot.bad{background:var(--bad);border-color:var(--bad);color:#fff}
  .li-body{flex:1;min-width:0}
  .li-name{font-weight:700;font-size:16.5px;line-height:1.35}
  .li-qty{font-size:13px;color:var(--ink-soft);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .tb{font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
  .t-藥品{background:rgba(224,49,49,.14);color:#e03131}.t-耗材{background:rgba(15,122,134,.15);color:#0f9aa8}
  .t-器械{background:rgba(28,126,214,.14);color:#1c7ed6}.t-儀器{background:rgba(103,65,217,.15);color:#7c5cf0}.t-其他{background:rgba(120,130,139,.16);color:#828c95}
  .li-ctrl{display:flex;align-items:center;gap:6px;padding:0 10px}
  .flagbtn{border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);font-family:inherit;
    font-size:13.5px;font-weight:700;padding:8px 13px;border-radius:8px;cursor:pointer;white-space:nowrap}
  .flagbtn.on{background:var(--bad);border-color:var(--bad);color:#fff}
  .locate-mini{border:1.5px dashed var(--line);background:var(--card);font-size:14px;padding:5px 8px;border-radius:8px;cursor:pointer}
  .li-abn{flex-basis:100%;padding:10px 12px;border-top:1px dashed var(--line);background:var(--bad-soft)}
  .abn-h{font-size:11.5px;font-weight:700;color:var(--bad);margin-bottom:7px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:5px 10px;border-radius:999px;border:1.5px solid var(--line);background:var(--card);font-size:12px;
    font-weight:700;color:var(--ink-soft);font-family:inherit;cursor:pointer}
  .chip.on{background:var(--warn);border-color:var(--warn);color:#fff}
  .chip.on.money{background:var(--bad);border-color:var(--bad)}
  .chip.on.repair{background:var(--brand);border-color:var(--brand)}
  .repair-note{font-size:11px;color:var(--brand);font-weight:700;margin-top:8px}
  .note-in{width:100%;margin-top:8px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;
    font-size:13px;font-family:inherit;background:var(--card);color:var(--ink)}
  /* map placeholder */
  .mapbox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;text-align:center}

  /* bottom bar */
  .bottombar{position:sticky;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-top:1px solid var(--line);padding:12px 18px;display:flex;gap:12px;align-items:center;z-index:40}
  .bottombar-in{max-width:1120px;margin:0 auto;width:100%;display:flex;gap:12px;align-items:center}
  .progress{flex:1}.progress .ptxt{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:5px}
  .pbar{height:7px;background:var(--line);border-radius:999px;overflow:hidden}.pbar>div{height:100%;background:var(--brand);transition:width .3s}

  /* summary */
  .sum-row{display:flex;gap:12px;margin-bottom:14px}
  .sum-stat{flex:1;background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:16px 10px;text-align:center}
  .sum-stat .n{font-size:30px;font-weight:800}.sum-stat .l{font-size:12px;color:var(--ink-soft);margin-top:2px;font-weight:600}
  .sum-stat.bad .n{color:var(--bad)}.sum-stat.ok .n{color:var(--ok)}
  .issue{display:flex;gap:11px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
  .issue:last-child{border-bottom:none}
  .issue-ic{width:32px;height:32px;border-radius:9px;flex:0 0 32px;display:flex;align-items:center;justify-content:center;font-size:15px}
  .issue-ic.bad{background:var(--bad-soft)}.issue-ic.warn{background:var(--warn-soft)}
  .issue-t{font-weight:700;font-size:14px}.issue-d{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
  .done-wrap{text-align:center;padding:46px 20px;max-width:460px;margin:0 auto}
  .done-circle{width:84px;height:84px;border-radius:50%;background:var(--ok-soft);display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 18px}

  /* responsive */
  @media(min-width:680px){
    .item-list{grid-template-columns:repeat(2,1fr)}
    .sheet-list{grid-template-columns:repeat(2,1fr)}
    .area-tiles{grid-template-columns:repeat(3,1fr)}
    .screen{padding:22px}
  }
  @media(min-width:1040px){
    .item-list{grid-template-columns:repeat(3,1fr)}
    .sheet-list{grid-template-columns:repeat(3,1fr)}
    .area-tiles{grid-template-columns:repeat(4,1fr)}
  }

  /* 儀器定位浮動速查表 */
  .loc-sheet{position:fixed;inset:0;background:rgba(15,32,43,.45);z-index:999;display:flex;align-items:flex-end;justify-content:center}
  .loc-sheet-card{background:var(--card);width:100%;max-width:520px;border-radius:18px 18px 0 0;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 -8px 30px rgba(0,0,0,.28);animation:locUp .18s ease}
  @keyframes locUp{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .loc-sheet-h{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line);font-size:15.5px;font-weight:700;color:var(--brand-dark)}
  .loc-x{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;line-height:1}
  .loc-sheet-body{overflow-y:auto;padding:6px 12px}
  .loc-item{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px solid var(--line)}
  .loc-item:last-child{border-bottom:none}
  .loc-item-main{flex:1;min-width:0}.loc-item-main b{font-size:15px}
  .loc-item-main .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px}
  .loc-st-badge{display:inline-block;font-size:11px;padding:1px 8px;border-radius:999px;background:var(--brand-soft);color:var(--brand-dark);margin-left:6px}
  .loc-map-btn{border:1.5px solid var(--brand);color:var(--brand);background:var(--card);border-radius:9px;padding:8px 16px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
  .loc-empty{text-align:center;color:var(--ink-soft);padding:26px 10px;font-size:14px}.loc-empty span{font-size:12px}
  .loc-sheet-foot{padding:10px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);text-align:center}

  /* 欠物本 */
  .owe-sec{margin-bottom:16px}
  .owe-zone{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;border-left:4px solid var(--brand);padding-left:10px;margin:0 2px 8px}
  .owe-n{margin-left:auto;font-size:12px;color:var(--ink-soft);font-weight:600}
  .owe-row{display:flex;align-items:flex-start;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line)}
  .owe-row:last-child{border-bottom:none}
  .owe-main{flex:1;min-width:0}.owe-main b{font-size:15px}
  .owe-sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;word-break:break-all}
  .owe-date{font-size:12px;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums}

  .owe-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .owe-badge{display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:999px;background:var(--warn-soft);color:var(--warn);margin-left:6px;vertical-align:middle}
  .owe-close{border:1.5px solid var(--brand);color:var(--brand);background:var(--card);border-radius:8px;padding:5px 12px;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap}
  .owe-f{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:10px}
  .owe-f select,.owe-f input{display:block;width:100%;margin-top:4px;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;font-family:inherit;background:var(--card);color:var(--ink)}
  .owe-mini{margin-top:8px;border:1.5px solid #b5680f;color:#b5680f;background:#fff8ee;border-radius:8px;padding:6px 13px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%) translateY(20px);background:#23313b;color:#fff;padding:11px 18px;border-radius:10px;font-size:14px;z-index:1200;opacity:0;transition:.3s;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

async function loadItems(){
  if(!API_URL)return;
  try{
    const r=await fetch(API_URL+(API_URL.includes('?')?'&':'?')+'table=items',{cache:'no-store'});
    const rows=await r.json();
    if(Array.isArray(rows)&&rows.length) ITEMS=rows.map(x=>Array.isArray(x)?x:[x.sheetId||x.area,x.name,x.qty,x.type,x.assign||'']);
  }catch(e){console.error('讀點班清單失敗,改用內建清單',e);}
}
async function askAI(task,payload){
  if(!API_URL){alert('尚未設定後端 API_URL');return '';}
  const r=await fetch(API_URL,{method:'POST',body:JSON.stringify({task,payload})});
  const d=await r.json(); if(d.error) throw d.error; return d.text;
}
async function aiHandover(){
  const s=sheetById(state.sheetId);const list=itemsOf(s.id,state.half);
  const issues=[];
  list.forEach(o=>{const k=keyOf(o);if(state.checks[k]==='bad'){
    const r=state.reason[k]||'未註記原因';issues.push({t:o.name,d:r+(state.note[k]?'・'+state.note[k]:'')});}});
  const box=document.getElementById('aiBox');box.style.display='block';box.textContent='AI 產生中…';
  try{ box.textContent=await askAI('handover',{sheet:s.name,shift:SHIFT_NAME[state.shift],issues}); }
  catch(e){ box.textContent='AI 失敗:'+e; }
}

// ---------- helpers ----------
const $app=document.getElementById('app');
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function areaById(id){return AREAS.find(a=>a.id===id)||{}}
function sheetById(id){return SHEETS.find(s=>s.id===id)||{}}
function areaColor(id){return (areaById(id).color)||'#0f7a86'}
function fmtDate(d){return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`}
function weekday(d){return ['週日','週一','週二','週三','週四','週五','週六'][d.getDay()]}
function detectShift(){const h=new Date().getHours();return (h>=7&&h<15)?'D':(h>=15&&h<23)?'E':'N'}
const SHIFT_NAME={D:'白班',E:'小夜',N:'大夜'};
function prevShiftName(cur){return SHIFT_NAME[{D:'N',E:'D',N:'E'}[cur]||'D']}
const ROLE_BADGE={'護理長':['可管理主檔・審核・點班'],'副護理長':['可審核・點班'],'點班人員':['可點班']};
const REASONS=['數量短少','借出未還','待補貨','送修','漏計價','遺失'];

// item key & filtering
function itemsOf(sheetId,half){
  return ITEMS.map((it,i)=>({i,sheet:it[0],name:it[1],qty:it[2],type:it[3],assign:it[4]}))
              .filter(o=>o.sheet===sheetId && (!half || o.assign===half));
}
function keyOf(o){return o.sheet+'|'+o.i}

// ---------- state ----------
let state={screen:'login',user:null,areaId:null,sheetId:null,half:null,checks:{},reason:{},note:{}};
const store={
  save(){try{localStorage.setItem('ed_rc2',JSON.stringify(state))}catch(e){}},
  load(){try{const s=localStorage.getItem('ed_rc2');if(s)state=JSON.parse(s)}catch(e){}}
};

// progress for a sheet (all halves)
function sheetProgress(sheetId){
  const all=itemsOf(sheetId,null);
  let done=0;all.forEach(o=>{if(state.checks[keyOf(o)])done++});
  return {total:all.length,done};
}
function sheetStatus(sheetId){
  const p=sheetProgress(sheetId);
  if(p.done===0)return ['st-todo','未開始'];
  if(p.done<p.total)return ['st-doing',`進行中 ${p.done}/${p.total}`];
  return ['st-done','已完成'];
}

// ---------- render ----------
function render(){
  store.save();
  if(!state.user)state.screen='login';
  ({login:renderLogin,home:renderHome,areas:renderAreas,pick:renderPick,half:renderHalf,
    rollcall:renderRollcall,summary:renderSummary,done:renderDone,map:renderMap,
    history:renderHistory,leader:renderLeader,ai:renderAI,owed:renderOwed}[state.screen]||renderLogin)();
}

function doLogin(){
  const emp=document.getElementById('empIn').value.trim();
  const pw=document.getElementById('pwIn').value.trim();
  const err=document.getElementById('loginErr');
  const a=ACCOUNTS.find(x=>x.id===emp);
  if(!a){err.textContent='查無此員編';return}

function renderRollcall(){
  const s=sheetById(state.sheetId);const list=itemsOf(s.id,state.half);
  const acolor=areaColor(s.area);
  let done=0;list.forEach(o=>{if(state.checks[keyOf(o)])done++});

  const halfTxt=state.half?` · ${state.half} 半`:'';
  const remain=list.length-done;

    ? `<div class="status-banner done"><div class="sb-ic">✓</div>

    : `<div class="status-banner todo"><div class="sb-ic">!</div>

      <span class="tool-pill" onclick="openMap('全部儀器')">📍 儀器定位</span>

        onclick="alert('欠物本：可新增一筆欠物、查詢未結項目、標記已補齊（正式版）。')">＋ 新增 / 查看欠物</button>
    </div></div>`;

  $app.innerHTML=`
  <div class="topbar" style="background:linear-gradient(135deg,${acolor},${acolor}cc)"><div class="topbar-in" style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="title">${esc(s.name)}${halfTxt}</div>

    <button class="back" onclick="backFromRollcall()">返回</button></div></div>
  <div class="screen wide lvl2">
    ${banner}
    <div class="card" style="padding:13px 15px;margin-bottom:14px;border-left:4px solid ${acolor}">
      <div style="font-size:12.5px;font-weight:800;color:var(--ink-soft);margin-bottom:6px">📋 上一班（${prevShiftName(state.shift)}）點班結果</div>
      <div style="font-size:13px;color:var(--ink-soft);line-height:1.7">
        ＊正式版顯示上一班的完成狀態與異常，交接更清楚。<br>
        <span style="color:var(--bad);font-weight:700">● 未結請修</span>：x-ray 遙控器（上一班報修，維修中）— 已自動帶入本班<br>

function renderItem(o,s){
  const k=keyOf(o);const st=state.checks[k];const isDev=o.type==='儀器';
  const dot=st==='ok'?'<span class="dot ok">✓</span>':st==='bad'?'<span class="dot bad">!</span>':'<span class="dot"></span>';
  const assignB=o.assign?`<span class="tb t-儀器">${o.assign}</span>`:'';
  const _zn=areaById(s.area)?areaById(s.area).name:'';
  const _owes=owedFor(o.name,_zn);
  const oweTag=_owes.length?`<span class="owe-tag" onclick="event.stopPropagation();showOwedDetail('${esc(o.name).replace(/'/g,"")}','${esc(_zn).replace(/'/g,"")}')">🔖 欠物中×${_owes.length}</span>`:'';
  const dev=isDev?`<button class="locate-mini" onclick="openMap('${esc(o.name).replace(/'/g,"")}')" title="定位">📍</button>`:'';
  const repairNote=isDev&&state.reason[k]==='送修'?`<div class="repair-note">🔧 將於 Leader 系統開立請修單（示意）</div>`:'';
  const abn=st==='bad'?`<div class="li-abn">
     <div class="abn-h">⚠ 異常／沒有 — 請註記</div>
     <div class="chips">${REASONS.map(r=>{const on=state.reason[k]===r;
        const cls=(r==='漏計價'||r==='遺失')?'money':(r==='送修'?'repair':'');
        return `<button class="chip ${on?'on':''} ${cls}" onclick="setReason('${k}','${r}')">${r}</button>`}).join('')}</div>
     ${repairNote}
     <input class="note-in" placeholder="備註（選填）" value="${esc(state.note[k]||'')}" onchange="setNote('${k}',this.value)">
     ${['數量短少','借出未還','待補貨','遺失'].includes(state.reason[k])?`<button class="owe-mini" onclick="oweFromRollcall('${esc(areaById(s.area).name)}','${esc(o.name).replace(/'/g,"")}','${state.reason[k]}')">＋記欠物</button>`:''}</div>`:'';
  return `<div class="li ${st==='bad'?'is-bad':''}">
    <div class="li-tap" onclick="setCheck('${k}','ok')">
      ${dot}
      <div class="li-body"><div class="li-name">${esc(o.name)}${assignB}${oweTag}</div>
        <div class="li-qty">標準 ${esc(o.qty)} <span class="tb t-${o.type}">${o.type}</span></div></div>
    </div>
    <div class="li-ctrl">${dev}<button class="flagbtn ${st==='bad'?'on':''}" onclick="setCheck('${k}','bad')">異常</button></div>
    ${abn}</div>`;
}
function setCheck(k,v){state.checks[k]=(state.checks[k]===v?'':v);if(state.checks[k]!=='bad'){delete state.reason[k];delete state.note[k]}render()}
function setReason(k,r){state.reason[k]=(state.reason[k]===r?'':r);render()}

function owedFor(name,zoneName){
  return OWED.filter(d=>d.status!=='已返還結案').filter(d=>{
    const z=zoneName||'',dz=d.zone||'';

    if(!zok)return false;
    const a=d.item||'',b=name||''; if(!a||!b)return false; // 名稱寬鬆比對

function matchDevices(name){
  if(!name||name==='全部儀器') return LOCED.slice();

  if(r.length) return r;
  for(let i=0;i<name.length-1;i++){const g=name.substr(i,2);
    const m=LOCED.filter(d=>(d.cat&&d.cat.includes(g))||(d.name&&d.name.includes(g)));
    if(m.length) return m;}
  return [];
}

function genHistDemo(){
  // demo：產生近 14 天的假紀錄（含異常明細）
  const ISSUE_POOL=[
    {area:'急救室',item:'CVP 套組',reason:'漏計價',type:'耗材'},
    {area:'檢傷',item:'兒科手機',reason:'送修',type:'儀器'},
    {area:'留觀',item:'4x4 紗布',reason:'待補貨',type:'耗材'},
    {area:'治療',item:'x-ray 遙控器',reason:'遺失',type:'儀器'},
    {area:'急救室',item:'喉頭鏡葉',reason:'借出未還',type:'器械'},
  ];
  const NAMES=['陳子瑄','王孝彰','蔡婷瑋','吳鈺珊','劉逸靚'];
  const days=[];const today=new Date();
  for(let i=0;i<14;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const shifts=['N','E','D'].map((sh,si)=>{
      const total=14, done=(i===0&&sh===state.shift)?Math.floor(Math.random()*total):total;
      const issueN=(i+sh.charCodeAt(0))%4===0?1:0;
      const issues=[];for(let n=0;n<issueN;n++)issues.push(ISSUE_POOL[(i+si+n)%ISSUE_POOL.length]);
      const op=NAMES[(i+si)%NAMES.length];
      return {sh,total,done,issues,op};
    });
    days.push({date:d,shifts});
  }
  return days;
}
// 可展開的單班列（點入看明細）
function histShiftRow(s,id){
  const done=s.done===s.total;
  const tag=done?`<span class="pill-ok">已完成</span>`:`<span class="pill-warn">${s.done}/${s.total}</span>`;
  const iss=s.issues.length?` <span class="pill-bad">異常 ${s.issues.length}</span>`:'';
  state._openShift=state._openShift||{};
  const open=state._openShift[id];
  const chev=`<span style="color:var(--ink-soft);font-size:13px;margin-left:8px">${open?'▾':'▸'}</span>`;
  let detail='';
  if(open){
    const issLines=s.issues.length?s.issues.map(x=>{
      const money=(x.reason==='漏計價'||x.reason==='遺失');
      const rcls=money?'pill-bad':(x.reason==='送修'?'pill-warn':'pill-warn');
      return `<div class="hd-row">
        <span>${esc(x.area)} · ${esc(x.item)} <span style="font-size:11px;color:var(--ink-soft)">(${x.type})</span></span>
        <span class="${rcls}">${esc(x.reason)}</span></div>`;
    }).join(''):`<div class="hd-row" style="color:var(--ok)">✓ 無異常項目</div>`;
    detail=`<div class="hist-detail">
      <div style="font-size:12px;color:var(--ink-soft);margin-bottom:7px">點班人員：${esc(s.op)} · 完成 ${s.done}/${s.total} 項</div>
      ${issLines}</div>`;
  }
  return `<div class="hist-shift" onclick="toggleShift('${id}')" style="cursor:pointer">
      <span>${SHIFT_NAME[s.sh]}${chev}</span><span>${tag}${iss}</span></div>${detail}`;
}

        <span>${n}</span><span>${v}%</span></div>
      <div class="ai-bar"><div style="width:${v}%;background:${v>=90?'var(--ok)':v>=80?'var(--warn)':'var(--bad)'}"></div></div></div>`).join('');

  $app.innerHTML=`
  <div class="topbar" style="background:linear-gradient(135deg,#6741d9,#9c5cf0)"><div class="topbar-in" style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="title">🤖 AI 點班分析</div><div class="sub">近 30 天資料 · ${esc(state.user.name)}</div></div>
    <button class="back" onclick="state.screen='history';render()">返回</button></div></div>
  <div class="screen wide lvl2">
    <div class="ai-card">
      <div class="ai-hd"><div class="ai-logo">🤖</div>
        <div><div style="font-weight:800;font-size:16px">分析摘要</div>
          <div style="font-size:12px;color:var(--ink-soft)">由 Claude 自動分析點班與欠物資料</div></div></div>
      <div id="aiSummary" style="font-size:13.5px;line-height:1.75;color:var(--ink-soft)"></div>
    </div>
    <div class="ai-card">
      <div style="font-weight:800;font-size:15px;margin-bottom:12px">🔍 重點發現</div>
      ${insightHtml}
    </div>
    <div class="ai-card">
      <div style="font-weight:800;font-size:15px;margin-bottom:12px">📊 各班點班完成率</div>
      ${compHtml}
      <div style="font-size:12.5px;color:var(--ink-soft);margin-top:6px">大夜班完成率偏低，建議檢視夜間人力或簡化流程。</div>
    </div>
    <button class="btn btn-primary btn-block" onclick="alert('正式版：可選分析範圍（日/週/月）、產出 PDF 報告、串 Claude API 做即時問答。')">📄 產出分析報告</button>
    <div style="font-size:11.5px;color:var(--ink-soft);margin-top:12px;line-height:1.6">
      ＊demo 為示意分析。正式版將透過 Claude API 即時分析真實點班 / 欠物 / 保養資料，
      可問如「這個月哪一區最常缺藥？」「漏計價估計損失多少？」並產出報告供護理長決策。</div>
  </div>`;

  // 模擬 AI 逐字輸出
  const txt='本月共完成 248 班次點班，整體完成率 88%。發現 3 項需關注：耗材短少集中在檢傷區、漏計價以急救室較多、夜班完成率偏低。建議優先處理高價耗材的計價流程與夜間人力配置。';
  const el=document.getElementById('aiSummary');let i=0;
  if(el){(function type(){if(i<=txt.length){el.innerHTML=esc(txt.slice(0,i))+'<span class="ai-typing">▋</span>';i++;setTimeout(type,18)}else{el.innerHTML=esc(txt)}})();}
}

function renderSummary(){
  const s=sheetById(state.sheetId);const list=itemsOf(s.id,state.half);
  const issues=[];
  list.forEach(o=>{const k=keyOf(o);if(state.checks[k]==='bad'){
    const r=state.reason[k]||'未註記原因';const money=(r==='漏計價'||r==='遺失');
    issues.push({type:money?'bad':'warn',t:o.name,d:r+(state.note[k]?'・'+state.note[k]:'')})}});
  const issuesHtml=issues.length?issues.map(i=>`<div class="issue">
     <div class="issue-ic ${i.type}">${i.type==='bad'?'⚠':'!'}</div>
     <div><div class="issue-t">${esc(i.t)}</div><div class="issue-d">${esc(i.d)}</div></div></div>`).join('')
     :'<div style="text-align:center;color:var(--ok);padding:16px;font-weight:600">✓ 無異常</div>';
  $app.innerHTML=`
  <div class="topbar"><div class="topbar-in" style="display:flex;justify-content:space-between;align-items:center">
    <div><div class="title">點班摘要 · ${esc(s.name)}${state.half?(' '+state.half+'半'):''}</div>
      <div class="sub">${fmtDate(new Date())} · ${SHIFT_NAME[state.shift]}</div></div>
    <button class="back" onclick="state.screen='rollcall';render()">返回</button></div></div>
  <div class="screen narrow">
    <div class="sum-row">
      <div class="sum-stat"><div class="n">${list.length}</div><div class="l">點檢項目</div></div>
      <div class="sum-stat ${issues.length?'bad':'ok'}"><div class="n">${issues.length}</div><div class="l">異常項目</div></div>
    </div>
    <div class="section-h">異常清單</div>
    <div class="card">${issuesHtml}</div>
    <button class="btn btn-block" style="margin-bottom:10px" onclick="aiHandover()">✨ 產生 AI 交班摘要</button>
    <div id="aiBox" class="card" style="display:none;white-space:pre-wrap;line-height:1.7;margin-bottom:10px"></div>
    <button class="btn btn-primary btn-block" onclick="state.screen='done';render()">提交並簽核</button>
  </div>`;
}

function renderDone(){
  const s=sheetById(state.sheetId);
  $app.innerHTML=`
  <div class="screen"><div class="done-wrap">
    <div class="done-circle">✓</div>
    <h2 style="margin:0 0 6px">點班完成</h2>
    <p style="color:var(--ink-soft);margin:0 0 24px">${esc(s.name)}${state.half?(' '+state.half+'半'):''}<br>
      ${esc(state.user.name)}（${esc(state.user.title)}）· ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})} 簽核</p>
    <button class="btn btn-primary btn-block" onclick="state.screen='pick';render()">回點班表清單</button>
    <button class="btn btn-ghost btn-block" style="margin-top:10px" onclick="state.screen='home';render()">回首頁</button>
  </div></div>`;
}

// ---------- start ----------
applyTheme();
store.load();
state.shift=state.shift||detectShift();
if(!state.user)state.screen='login';
render();
(async()=>{ await Promise.all([loadItems(),loadLocator(),loadOwed()]); render(); })();
</script>
</body>
</html>
